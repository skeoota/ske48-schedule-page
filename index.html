<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKE48 Theater Schedule & Profile Portal</title>
    <style>
        :root {
            --ske-mint: #bfeae5; /* SKE48 고유 민트 배경색 */
            --ske-border: #444;
            --primary-bg: #ffffff;
            --text-color: #222;
            --light-bg: #f9f9f9;
            --accent-color: #ff3366;
            --accent-light: #ffe6eb;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', 'Helvetica', 'Arial', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            color: var(--text-color);
            background-color: #eceff1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 메인 컨테이너 레이아웃 (기본 데스크톱 사양) */
        .app-container {
            display: flex;
            width: 1200px;
            height: 800px;
            background: var(--primary-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* 1. 좌측 패널: 멤버 프로필 및 개인 스케줄 리스트 */
        .left-panel {
            width: 360px;
            background-color: var(--light-bg);
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            overflow-y: auto;
            position: relative;
        }

        /* 모바일 닫기 버튼 (기본 데스크톱에서는 미노출) */
        .drawer-close-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            align-self: flex-end;
            color: #555;
            padding: 0;
            margin-bottom: 10px;
            line-height: 1;
        }

        /* 모바일 오버레이 배경 레이어 (기본 데스크톱에서는 미노출) */
        .drawer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.4);
            z-index: 1500;
        }

        .profile-placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #888;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px dashed #ddd;
            padding-bottom: 16px;
            margin-bottom: 16px;
        }

        /* 4:5 세로형 이미지 액자 */
        .profile-img-wrapper {
            width: 140px;
            height: 175px;
            background-color: var(--ske-mint);
            border: 1px solid var(--ske-border);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .profile-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            margin: 12px 0 4px 0;
            text-align: center;
        }

        .profile-team {
            font-size: 13px;
            color: #666;
            background: #e0f2f1;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .profile-bio {
            font-size: 13px;
            color: #555;
            margin-top: 10px;
            line-height: 1.5;
            text-align: center;
        }

        /* 아코디언 접고 펴기 헤더 스타일 */
        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #eaeaea;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 12px;
            user-select: none;
            transition: background-color 0.2s;
        }

        .accordion-header:hover {
            background-color: #ddd;
        }

        .accordion-content {
            margin-top: 8px;
        }

        .accordion-content.collapsed {
            display: none; 
        }

        .arrow-indicator {
            font-size: 12px;
            color: #555;
        }

        /* 세부 상세 프로필 테이블 양식 */
        .profile-details-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .profile-details-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            line-height: 1.4;
        }

        .profile-details-table td.label-td {
            font-weight: bold;
            color: #555;
            background-color: #f7f7f7;
            width: 35%;
        }

        .profile-details-table tr:last-child td {
            border-bottom: none;
        }

        .member-schedule-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .member-schedule-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            line-height: 1.4;
            transition: border-color 0.2s;
        }

        .member-schedule-item .highlight-name {
            color: var(--accent-color);
            background-color: var(--accent-light);
            font-weight: bold;
            padding: 0 4px;
            border-radius: 2px;
        }

        /* 2. 우측 메인 패널 */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 상단 네비게이션 헤더 */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #fff;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-nav h2 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #111;
            min-width: 150px;
            text-align: center;
        }

        .nav-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #e0e0e0;
        }

        /* 다국어 선택 드롭다운 */
        .lang-select-wrapper select {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: #fff;
            cursor: pointer;
            outline: none;
        }

        /* 탭 가로 메뉴 스타일 */
        .tab-menu-container {
            display: flex;
            background-color: #f0f0f0;
            padding: 4px;
            border-radius: 8px;
            margin: 0 24px 16px 24px;
            gap: 4px;
        }

        .tab-menu-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-menu-btn.active {
            background-color: #fff;
            color: #00796b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* 하단 타임라인 분할 레이아웃 */
        .content-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 달력 타임라인 리스트 */
        .timeline-wrapper {
            width: 320px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            background: #fcfcfc;
        }

        .timeline-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        .timeline-day {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background-color 0.2s, border-color 0.2s;
            border: 1px solid transparent;
        }

        .timeline-day:hover {
            background-color: #f1f1f1;
        }

        .timeline-day.active {
            background-color: #e0f2f1;
            border-color: #80cbc4;
        }

        .timeline-day.today-highlight {
            border: 2px solid var(--accent-color);
            background-color: #fff9fa;
        }

        .day-num {
            font-size: 18px;
            font-weight: bold;
            color: #777;
            width: 24px;
            text-align: right;
        }

        .timeline-day.active .day-num {
            color: #00796b;
        }

        .day-content {
            flex: 1;
            font-size: 13px;
        }

        .day-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 2px;
        }

        .day-cast-summary {
            font-size: 11px;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        /* 캐스트 정보 그리드 상세 표시 */
        .detail-wrapper {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .detail-header {
            margin-bottom: 24px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: bold;
            margin: 0 0 8px 0;
            color: #111;
        }

        .detail-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 16px;
        }

        .cast-container {
            margin-top: 20px;
        }

        .cast-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            border-left: 4px solid #00796b;
            padding-left: 8px;
            margin-bottom: 16px;
        }

        .cast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
        }

        /* 프로필 보기 모드일 때의 전체 리스트 영역 */
        .profiles-view-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            box-sizing: border-box;
            display: none; 
        }

        /* 팀별 섹션 레이아웃 */
        .team-section {
            margin-bottom: 32px;
        }

        /* SKE48 스타일 그리드 미니 카드 */
        .member-mini-card {
            background-color: var(--primary-bg);
            border: 1px solid #ddd;
            padding: 6px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .member-mini-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .member-mini-card .img-frame {
            width: 100%;
            aspect-ratio: 4 / 5;
            background-color: var(--ske-mint);
            border: 1px solid var(--ske-border);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .member-mini-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-mini-card .card-name {
            margin-top: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #111;
            text-align: center;
            white-space: nowrap;
        }

        .loading-text {
            font-size: 14px;
            color: #888;
            text-align: center;
            margin-top: 20px;
        }

        /* ==========================================
           3. [추가] 모바일 반응형 768px 이하 대응 미디어 쿼리 [1]
           ========================================== */
        @media (max-width: 768px) {
            body {
                height: 100%;
                overflow: auto;
            }

            /* 컨테이너 전체화면화 및 세로형 흐름 전환 */
            .app-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                flex-direction: column;
                box-shadow: none;
            }

            /* 좌측 패널 -> 모바일 슬라이딩 서랍장(Drawer) 시스템으로 변환 */
            .left-panel {
                position: fixed;
                top: 0;
                left: -100%; /* 디폴트 상태에서는 좌측 화면 밖 배치 */
                width: 85%;
                max-width: 340px;
                height: 100%;
                z-index: 2000;
                transition: left 0.3s ease;
                box-shadow: 5px 0 20px rgba(0,0,0,0.15);
                border-right: none;
            }

            /* 활성화 시 부드럽게 등장 */
            .left-panel.drawer-active {
                left: 0;
            }

            /* 모바일 닫기 버튼 활성화 */
            .drawer-close-btn {
                display: block;
            }

            /* 타임라인 분할 영역이 모바일에서는 위아래 적층 레이아웃으로 변경 */
            .content-area {
                flex-direction: column;
            }

            /* 달력 타임라인 높이 조절 */
            .timeline-wrapper {
                width: 100%;
                height: 220px;
                border-right: none;
                border-bottom: 1px solid #eee;
            }

            /* 스케줄 세부 라인업 공간 최적화 */
            .detail-wrapper {
                flex: 1;
                padding: 16px;
            }

            /* 탭 셀렉터 마진 축소 */
            .tab-menu-container {
                margin: 0 16px 12px 16px;
            }

            /* 헤더 크기 및 정렬 조절 */
            .header-nav {
                padding: 12px 16px;
            }

            .header-nav h2 {
                font-size: 16px;
                min-width: 110px;
            }

            .nav-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .lang-select-wrapper select {
                padding: 6px 8px;
                font-size: 12px;
            }

            /* 모바일 환경 그리드 카드 최적 소형화 */
            .cast-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
                gap: 12px;
            }

            .member-mini-card .card-name {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<!-- 모바일 전용 딤드 배경 오버레이 레이어 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeMobileDrawer()"></div>

<div class="app-container">
    <!-- 좌측 패널 (모바일 환경에서는 슬라이딩 서랍장으로 트랜지션 작동) -->
    <aside class="left-panel" id="left-panel">
        <!-- 모바일 닫기 (X) 버튼 -->
        <button class="drawer-close-btn" id="drawer-close-btn" onclick="closeMobileDrawer()">&times;</button>
        <!-- 동적 렌더링 컨텐츠 컨테이너 -->
        <div id="left-panel-content" style="height: 100%;">
            <!-- 플레이스홀더 -->
        </div>
    </aside>

    <!-- 우측 메인 패널 -->
    <main class="main-panel">
        <!-- 년월 조절 및 다국어 헤더 -->
        <header class="header-nav">
            <div class="nav-controls">
                <button class="nav-btn" onclick="changeMonth(-1)" id="btn-prev-month">&lt;</button>
                <h2 id="view-month-label">...</h2>
                <button class="nav-btn" onclick="changeMonth(1)" id="btn-next-month">&gt;</button>
            </div>
            
            <div class="lang-select-wrapper">
                <select id="lang-select" onchange="switchLanguage(this.value)">
                    <option value="ko">한국어 (KO)</option>
                    <option value="ja">日本語 (JA)</option>
                    <option value="en">English (EN)</option>
                </select>
            </div>
        </header>

        <!-- 탭 가로 셀렉터 -->
        <nav class="tab-menu-container">
            <button class="tab-menu-btn active" id="tab-btn-schedule" onclick="switchViewMode('schedule')">극장 스케줄</button>
            <button class="tab-menu-btn" id="tab-btn-profiles" onclick="switchViewMode('profiles')">멤버 프로필</button>
        </nav>

        <!-- 모드 1: 달력 스케줄 뷰 영역 -->
        <div class="content-area" id="schedule-view-area">
            <!-- 일별 타임라인 리스트 -->
            <div class="timeline-wrapper">
                <div class="timeline-container" id="timeline-container">
                    <div class="loading-text">Loading...</div>
                </div>
            </div>

            <!-- 스케줄 및 캐스트 정보 그리드 상세 표시 -->
            <div class="detail-wrapper" id="detail-wrapper">
                <!-- 상세 화면 플레이스홀더 -->
            </div>
        </div>

        <!-- 모드 2: 팀별 분류 조회 영역 -->
        <div class="profiles-view-wrapper" id="profiles-view-area">
            <!-- 멤버들이 팀별로 그룹화되어 구조적으로 렌더링됩니다 -->
        </div>
    </main>
</div>

            errLoadMembers: "data/members.json の読み込みに失敗しました。CORS制限またはパスを確認してください.",
            errLoadSchedule: "スケジュールの読み込みに失敗しました（{year}年{month}月）",
            loadingMembers: "メンバーデータ読み込み中...",
            loadingSchedule: "data/performances_{year}_{month}.json schedule 読み込み중...",
            
            accordionDetail: "詳細プロフィール",
            labelNickname: "ニックネーム",
            labelBirthdate: "生年月日",
            labelBloodType: "血液型",
            labelHometown: "出身地",
            labelHeight: "身長",
            labelMemberColor: "メンバーカラー",
            labelHobby: "趣味",
            labelSpecialty: "特技"
        },
        en: {
            title: "SKE48 Theater Schedule & Profile Portal",
            monthLabel: "{year}-{month}",
            prevMonth: "Prev Month",
            nextMonth: "Next Month",
            tabSchedule: "Theater Schedule",
            tabProfiles: "Member Profiles",
            teamCountLabel: "({count} members)",
            profilePlaceholder: "Select a member card or cast member<br>to view their profile and personal schedule for this month here.",
            detailPlaceholder: "Select a date from the timeline to view detailed performance information here.",
            noPerformance: "No Performance",
            noPerformanceDetail: "There are no theater performances scheduled for this day.",
            castLineup: "Cast Lineup ({count} members)",
            date: "Date",
            time: "Time",
            location: "Location",
            personalSchedule: "📅 {month} Personal Schedule",
            noPersonalSchedule: "No scheduled performances for this month.",
            datetime: "Date/Time",
            performance: "Performance",
            cast: "Cast",
            errLoadMembers: "Failed to load data/members.json. Please check local server CORS restrictions.",
            errLoadSchedule: "Failed to load schedule ({year}-{month})",
            loadingMembers: "Loading member data...",
            loadingSchedule: "Loading schedule data/performances_{year}_{month}.json...",
            
            accordionDetail: "Detailed Profile",
            labelNickname: "Nickname",
            labelBirthdate: "Birthdate",
            labelBloodType: "Blood Type",
            labelHometown: "Hometown",
            labelHeight: "Height",
            labelMemberColor: "Member Color",
            labelHobby: "Hobby",
            labelSpecialty: "Specialty"
        }
    };

    let currentLang = localStorage.getItem("ske_lang") || (navigator.language.startsWith("ja") ? "ja" : navigator.language.startsWith("en") ? "en" : "ko");
    
    function t(key, vars = {}) {
        let text = translations[currentLang][key] || key;
        for (const [k, v] of Object.entries(vars)) {
            text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), v);
        }
        return text;
    }

    // 전역 상태 변수
    let membersData = []; 
    let currentMonthPerformances = []; 
    let activeSelectedDay = null; 
    let activeViewMode = "schedule"; 
    
    let viewYear = 2026;
    let viewMonth = 6;
    const systemToday = new Date("2026-06-08");

    // 초기 실행 환경 구성
    async function initApplication() {
        document.getElementById("lang-select").value = currentLang;
        updateStaticPlaceholders();

        try {
            const response = await fetch("data/members.json");
            if (!response.ok) {
                throw new Error("members.json 데이터 로드 실패");
            }
            const data = await response.json();
            membersData = data.members || [];
        } catch (error) {
            console.error("초기 기동 에러:", error);
            showInitializationError(t("errLoadMembers"));
            return;
        }
        
        await loadTimeline();
        renderTeamBasedProfiles(); 
    }

    // 뷰 전환 통제
    function switchViewMode(mode) {
        activeViewMode = mode;
        
        const tabBtnSchedule = document.getElementById("tab-btn-schedule");
        const tabBtnProfiles = document.getElementById("tab-btn-profiles");
        const scheduleArea = document.getElementById("schedule-view-area");
        const profilesArea = document.getElementById("profiles-view-area");

        if (mode === "schedule") {
            tabBtnSchedule.classList.add("active");
            tabBtnProfiles.classList.remove("active");
            scheduleArea.style.display = "flex";
            profilesArea.style.display = "none";
        } else if (mode === "profiles") {
            tabBtnSchedule.classList.remove("active");
            tabBtnProfiles.classList.add("active");
            scheduleArea.style.display = "none";
            profilesArea.style.display = "block";
            renderTeamBasedProfiles(); 
        }
    }

    function updateStaticPlaceholders() {
        document.title = t("title");
        document.getElementById("btn-prev-month").textContent = `< ${t("prevMonth")}`;
        document.getElementById("btn-next-month").textContent = `${t("nextMonth")} >`;
        document.getElementById("tab-btn-schedule").textContent = t("tabSchedule");
        document.getElementById("tab-btn-profiles").textContent = t("tabProfiles");

        const leftPanelContent = document.getElementById("left-panel-content");
        if (!leftPanelContent.querySelector(".profile-card")) {
            leftPanelContent.innerHTML = `<div class="profile-placeholder"><p>${t("profilePlaceholder")}</p></div>`;
        }

        const detailWrapper = document.getElementById("detail-wrapper");
        if (!detailWrapper.querySelector(".detail-header") && !detailWrapper.querySelector(".loading-text")) {
            detailWrapper.innerHTML = `<div class="profile-placeholder"><p>${t("detailPlaceholder")}</p></div>`;
        }
    }

    // [모바일 인터랙션] 서랍장 닫기 제어 함수 [1]
    function closeMobileDrawer() {
        document.getElementById("left-panel").classList.remove("drawer-active");
        document.getElementById("drawer-overlay").classList.remove("active");
    }

    // 멤버를 팀별로 그룹화 및 순서(S -> KII -> E -> 연구생)대로 구분 나열
    function renderTeamBasedProfiles() {
        const container = document.getElementById("profiles-view-area");
        container.innerHTML = ""; 

        const grouped = {};
        membersData.forEach(member => {
            const team = member.position || "SKE48";
            if (!grouped[team]) {
                grouped[team] = [];
            }
            grouped[team].push(member);
        });

        const officialOrder = ["Team S", "チームS", "Team KⅡ", "Team KII", "チームKⅡ", "Team E", "チームE", "研究生"];
        const sortedTeamNames = Object.keys(grouped).sort((a, b) => {
            const indexA = officialOrder.findIndex(term => a.toUpperCase().includes(term.toUpperCase()) || term.toUpperCase().includes(a.toUpperCase()));
            const indexB = officialOrder.findIndex(term => b.toUpperCase().includes(term.toUpperCase()) || term.toUpperCase().includes(b.toUpperCase()));
            
            if (indexA === -1 && indexB === -1) return a.localeCompare(b);
            if (indexA === -1) return 1;
            if (indexB === -1) return -1;
            return indexA - indexB;
        });

        sortedTeamNames.forEach(teamName => {
            const membersInTeam = grouped[teamName];
            
            const sectionDiv = document.createElement("div");
            sectionDiv.className = "team-section";

            const titleDiv = document.createElement("div");
            titleDiv.className = "cast-title";
            titleDiv.textContent = `${teamName} ${t("teamCountLabel", { count: membersInTeam.length })}`;
            sectionDiv.appendChild(titleDiv);

            const gridDiv = document.createElement("div");
            gridDiv.className = "cast-grid";

            membersInTeam.forEach(member => {
                const card = document.createElement("div");
                card.className = "member-mini-card";
                card.onclick = () => selectMember(member.memberId);
                card.innerHTML = `
                    <div class="img-frame">
                        <img src="${member.profileImageUrl}" alt="${member.name}" onerror="this.src='https://placehold.co/140x175/bfeae5/333333?text=${member.name}'">
                    </div>
                    <div class="card-name">${member.name}</div>
                `;
                gridDiv.appendChild(card);
            });

            sectionDiv.appendChild(gridDiv);
            container.appendChild(sectionDiv);
        });
    }

    // 달력 데이터 취합 및 타임라인 생성
    async function loadTimeline() {
        const formattedMonth = String(viewMonth).padStart(2, '0');
        const yearMonthKey = `${viewYear}-${formattedMonth}`;
        
        document.getElementById("view-month-label").textContent = t("monthLabel", { year: viewYear, month: formattedMonth });
        
        const timelineContainer = document.getElementById("timeline-container");
        timelineContainer.innerHTML = `<div class="loading-text">${t("loadingSchedule", { year: viewYear, month: formattedMonth })}</div>`;

        try {
            const response = await fetch(`data/performances_${viewYear}_${formattedMonth}.json`);
            if (!response.ok) {
                throw new Error(`performances_${viewYear}_${formattedMonth}.json 로드 실패`);
            }
            const data = await response.json();
            currentMonthPerformances = data.performances || [];
        } catch (error) {
            console.warn(`스케줄 데이터 로드 실패 (${viewYear}-${formattedMonth}):`, error);
            currentMonthPerformances = [];
        }

        timelineContainer.innerHTML = "";
        const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();

        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${viewYear}-${formattedMonth}-${String(day).padStart(2, '0')}`;
            const targetPerf = currentMonthPerformances.find(p => p.date === dateStr);

            const dayDiv = document.createElement("div");
            dayDiv.className = "timeline-day";
            dayDiv.id = `day-element-${day}`;
            dayDiv.setAttribute("data-day", day);

            if (viewYear === systemToday.getFullYear() && viewMonth === (systemToday.getMonth() + 1) && day === systemToday.getDate()) {
                dayDiv.classList.add("today-highlight");
            }

            let contentHTML = `
                <div class="day-num">${day}</div>
                <div class="day-content">
            `;

            if (targetPerf) {
                const castNames = targetPerf.castIds.map(id => {
                    const m = membersData.find(mem => mem.memberId === id);
                    return m ? m.name : "";
                }).filter(name => name).join(", ");

                contentHTML += `
                    <div class="day-title">${targetPerf.title}</div>
                    <div class="day-cast-summary">${castNames}</div>
                `;
                dayDiv.onclick = () => {
                    activeSelectedDay = day;
                    selectPerformance(targetPerf, dayDiv);
                };
            } else {
                contentHTML += `
                    <div class="day-title" style="color: #bbb; font-weight: normal;">${t("noPerformance")}</div>
                    <div class="day-cast-summary">-</div>
                `;
                dayDiv.onclick = () => {
                    activeSelectedDay = day;
                    selectEmptyDay(dateStr, dayDiv);
                };
            }

            contentHTML += `</div>`;
            dayDiv.innerHTML = contentHTML;
            timelineContainer.appendChild(dayDiv);
        }

        setTimeout(() => {
            if (viewYear === systemToday.getFullYear() && viewMonth === (systemToday.getMonth() + 1)) {
                const todayElement = document.getElementById(`day-element-${systemToday.getDate()}`);
                if (todayElement) {
                    todayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    todayElement.click(); 
                }
            } else {
                const firstDayElement = document.getElementById(`day-element-1`);
                if (firstDayElement) firstDayElement.click();
            }
        }, 100);
    }

    async function changeMonth(step) {
        viewMonth += step;
        if (viewMonth > 12) {
            viewMonth = 1;
            viewYear += 1;
        } else if (viewMonth < 1) {
            viewMonth = 12;
            viewYear -= 1;
        }
        await loadTimeline();
        
        const activeProfileCard = document.querySelector(".profile-card .profile-name");
        if (activeProfileCard) {
            const memberObj = membersData.find(m => m.name === activeProfileCard.textContent);
            if (memberObj) selectMember(memberObj.memberId);
        }
    }

    async function switchLanguage(lang) {
        currentLang = lang;
        localStorage.setItem("ske_lang", lang); 
        
        updateStaticPlaceholders();
        await loadTimeline();

        if (activeSelectedDay && activeViewMode === "schedule") {
            const currentElement = document.getElementById(`day-element-${activeSelectedDay}`);
            if (currentElement) {
                currentElement.click();
            }
        }
        
        const activeProfileCard = document.querySelector(".profile-card .profile-name");
        if (activeProfileCard) {
            const memberObj = membersData.find(m => m.name === activeProfileCard.textContent);
            if (memberObj) selectMember(memberObj.memberId);
        }
    }

    function selectEmptyDay(dateStr, element) {
        clearActiveDay();
        element.classList.add("active");

        const detailWrapper = document.getElementById("detail-wrapper");
        detailWrapper.innerHTML = `
            <div class="detail-header">
                <h3 class="detail-title">${dateStr}</h3>
                <div class="detail-meta"><span>${t("noPerformanceDetail")}</span></div>
            </div>
        `;
    }

    function selectPerformance(perf, element) {
        clearActiveDay();
        element.classList.add("active");

        const detailWrapper = document.getElementById("detail-wrapper");
        
        let castCardsHTML = "";
        perf.castIds.forEach(id => {
            const member = membersData.find(mem => mem.memberId === id);
            if (member) {
                castCardsHTML += `
                    <div class="member-mini-card" onclick="selectMember('${member.memberId}')">
                        <div class="img-frame">
                            <img src="${member.profileImageUrl}" alt="${member.name}" onerror="this.src='https://placehold.co/140x175/bfeae5/333333?text=${member.name}'">
                        </div>
                        <div class="card-name">${member.name}</div>
                    </div>
                `;
            }
        });

        detailWrapper.innerHTML = `
            <div class="detail-header">
                <h1 class="detail-title">${perf.title}</h1>
                <div class="detail-meta">
                    <span><strong>${t("date")}:</strong> ${perf.date}</span>
                    <span><strong>${t("time")}:</strong> ${perf.time}</span>
                    <span><strong>${t("location")}:</strong> ${perf.venue}</span>
                </div>
            </div>
            <div class="cast-container">
                <div class="cast-title">${t("castLineup", { count: perf.castIds.length })}</div>
                <div class="cast-grid">
                    ${castCardsHTML}
                </div>
            </div>
        `;
    }

    function clearActiveDay() {
        const activeDays = document.querySelectorAll(".timeline-day.active");
        activeDays.forEach(d => d.classList.remove("active"));
    }

    function toggleAccordion(bodyId, arrowId) {
        const body = document.getElementById(bodyId);
        const arrow = document.getElementById(arrowId);
        if (!body || !arrow) return;
        
        if (body.classList.contains("collapsed")) {
            body.classList.remove("collapsed");
            arrow.textContent = "▼";
        } else {
            body.classList.add("collapsed");
            arrow.textContent = "▶";
        }
    }

    // 특정 멤버 카드 클릭 시 프로필 세부사항(details) 및 아코디언 바인딩
    function selectMember(memberId) {
        const member = membersData.find(m => m.memberId === memberId);
        if (!member) return;

        const leftPanelContent = document.getElementById("left-panel-content");
        const personalSchedules = currentMonthPerformances.filter(p => p.castIds.includes(memberId));

        // A. 세부 프로필(details) 데이터 매핑용 HTML 테이블 빌드 [1]
        let detailsTableHTML = "";
        const d = member.details || member.detail; 
        
        if (d) {
            const labelMap = {
                "nickname": t("labelNickname"),
                "birthdate": t("labelBirthdate"),
                "bloodType": t("labelBloodType"),
                "hometown": t("labelHometown"),
                "height": t("labelHeight"),
                "memberColor": t("labelMemberColor"),
                "hobby": t("labelHobby"),
                "specialty": t("labelSpecialty")
            };

            detailsTableHTML += `<table class="profile-details-table">`;
            for (const [key, label] of Object.entries(labelMap)) {
                if (d[key]) {
                    detailsTableHTML += `
                        <tr>
                            <td class="label-td">${label}</td>
                            <td>${d[key]}</td>
                        </tr>
                    `;
                }
            }
            detailsTableHTML += `</table>`;
        } else {
            detailsTableHTML = `<div class="profile-placeholder" style="padding:10px;">No detailed info.</div>`;
        }

        // B. 개인 스케줄 HTML 빌드
        let personalScheduleHTML = "";
        if (personalSchedules.length > 0) {
            personalSchedules.forEach(schedule => {
                const rawCastNames = schedule.castIds.map(id => {
                    const m = membersData.find(mem => mem.memberId === id);
                    if (!m) return "";
                    return m.memberId === memberId 
                        ? `<span class="highlight-name">${m.name}</span>`
                        : m.name;
                }).filter(name => name).join(", ");

                personalScheduleHTML += `
                    <div class="member-schedule-item">
                        <strong>${t("datetime")}:</strong> ${schedule.date} (${schedule.time})<br>
                        <strong>${t("performance")}:</strong> ${schedule.title}<br>
                        <strong>${t("cast")}:</strong> ${rawCastNames}
                    </div>
                `;
            });
        } else {
            personalScheduleHTML = `<div class="profile-placeholder" style="padding:10px;">${t("noPersonalSchedule")}</div>`;
        }

        // C. 동적 콘텐츠 영역 교체 (Close 버튼은 유지하기 위해 left-panel-content 내부에 주입)
        leftPanelContent.innerHTML = `
            <div class="profile-card">
                <div class="profile-img-wrapper">
                    <img src="${member.profileImageUrl}" alt="${member.name}" onerror="this.src='https://placehold.co/140x175/bfeae5/333333?text=${member.name}'">
                </div>
                <div class="profile-name">${member.name}</div>
                <div class="profile-team">${member.position}</div>
                <p class="profile-bio">${member.bio}</p>
            </div>
            
            <!-- 아코디언 1: 세부 정보 프로필 (기본값: 접힘 ▶) -->
            <div class="accordion-header" onclick="toggleAccordion('member-details-body', 'details-arrow-indicator')">
                <span>🔍 ${t("accordionDetail")}</span>
                <span class="arrow-indicator" id="details-arrow-indicator">▶</span>
            </div>
            <div id="member-details-body" class="accordion-content collapsed">
                ${detailsTableHTML}
            </div>

            <!-- 아코디언 2: 이번 달 스케줄 (기본값: 열림 ▼) -->
            <div class="accordion-header" onclick="toggleAccordion('member-schedule-body', 'schedule-arrow-indicator')">
                <span>${t("personalSchedule", { month: viewMonth })}</span>
                <span class="arrow-indicator" id="schedule-arrow-indicator">▼</span>
            </div>
            <div id="member-schedule-body" class="accordion-content">
                <div class="member-schedule-list">
                    ${personalScheduleHTML}
                </div>
            </div>
        `;

        // D. [모바일 인터랙션] 클릭 시 오버레이 서랍장과 어두운 배경화면 활성화 [1]
        document.getElementById("left-panel").classList.add("drawer-active");
        document.getElementById("drawer-overlay").classList.add("active");
    }

    function showInitializationError(message) {
        document.getElementById("timeline-container").innerHTML = `<div class="loading-text" style="color:red; font-weight:bold;">${message}</div>`;
    }

    window.onload = function() {
        initApplication();
    };
</script>
