<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKE48 Theater Schedule & Profile Portal</title>
    <!-- 외부 스타일시트 로드 -->
    <link rel="stylesheet" href="style.css">
    <!-- 자바스크립트 파일 로드 (defer로 DOM 로드 후 실행) -->
    <script src="app.js" defer></script>
</head>
<body>

<!-- 모바일 전용 딤드 배경 오버레이 레이어 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeMobileDrawer()"></div>

<div class="app-container">
    <!-- 좌측 패널 (모바일 환경에서는 슬라이딩 서랍장으로 트랜지션 작동) -->
    <aside class="left-panel" id="left-panel">
        <!-- 모바일 닫기 (X) 버튼 -->
        <button class="drawer-close-btn" id="drawer-close-btn" onclick="closeMobileDrawer()">&times;</button>
        <!-- 동적 렌더링 콘텐츠 컨테이너 -->
        <div id="left-panel-content" style="height: 100%;">
            <!-- 플레이스홀더 -->
        </div>
    </aside>

    <!-- 우측 메인 패널 -->
    <main class="main-panel">
        <!-- 년월 조절 및 다국어 헤더 -->
        <header class="header-nav">
            <div class="nav-controls">
                <button class="nav-btn" onclick="changeMonth(-1)" id="btn-prev-month">&lt;</button>
                
                <!-- 💡 [수정] 다국어 지원이 불가한 기본 인풋을 다국어 연동 드롭다운 컨테이너로 교체 [1] -->
                <div class="month-select-container">
                    <select id="year-select" onchange="handleSelectDateChange()" class="month-select-dropdown"></select>
                    <select id="month-select" onchange="handleSelectDateChange()" class="month-select-dropdown"></select>
                </div>
                
                <button class="nav-btn" onclick="changeMonth(1)" id="btn-next-month">&gt;</button>
                <!-- 언제든 오늘로 귀환하는 단독 버튼 탑재 -->
                <button class="nav-btn today-btn" onclick="goToToday()" id="btn-today">오늘</button>
            </div>
            
            <div class="lang-select-wrapper">
                <select id="lang-select" onchange="switchLanguage(this.value)">
                    <option value="ko">한국어 (KO)</option>
                    <option value="ja">日本語 (JA)</option>
                    <option value="en">English (EN)</option>
                </select>
            </div>
        </header>

        <!-- 탭 가로 셀렉터 -->
        <nav class="tab-menu-container">
            <button class="tab-menu-btn active" id="tab-btn-schedule" onclick="switchViewMode('schedule')">극장 스케줄</button>
            <button class="tab-menu-btn" id="tab-btn-profiles" onclick="switchViewMode('profiles')">멤버 프로필</button>
        </nav>

        <!-- 모드 1: 달력 스케줄 뷰 영역 -->
        <div class="content-area" id="schedule-view-area">
            <!-- 일별 타임라인 리스트 -->
            <div class="timeline-wrapper">
                <!-- 카테고리 필터 바 -->
                <div class="timeline-filter-bar" id="timeline-filter-bar"></div>
                
                <!-- 검색 필터 영역 -->
                <div class="timeline-search-wrapper">
                    <input type="text" id="timeline-search-input" oninput="handleSearchInput(this.value)" placeholder="공연명, 출연진, 장소 검색...">
                    <button class="search-clear-btn" id="search-clear-btn" onclick="clearSearchInput()">&times;</button>
                </div>
                
                <div class="timeline-container" id="timeline-container">
                    <div class="loading-text">Loading...</div>
                </div>
            </div>

            <!-- 스케줄 및 캐스트 정보 그리드 상세 표시 -->
            <div class="detail-wrapper" id="detail-wrapper">
                <!-- 상세 화면 플레이스홀더 -->
            </div>
        </div>

        <!-- 모드 2: 팀별 분류 조회 영역 -->
        <div class="profiles-view-wrapper" id="profiles-view-area">
            <!-- 멤버들이 팀별로 그룹화되어 구조적으로 렌더링됩니다 -->
        </div>
    </main>
</div>

</body>
</html>
